title: Splunk HEC
type: logs
streams:
  - input: filestream
    template_path: filestream.yml.hbs
    title: Splunk HEC (Ingest Actions via filestream)
    description: Processes Splunk HEC JSON written to disk by Splunk Ingest Actions
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/splunk_hec/*.json
        description: The full path to the related log file.
      - name: compression_gzip
        type: bool
        title: Enable gzip compression
        required: false
        show_user: false
        default: false
        description: Enable automatic gzip decompression of log files.
      - name: recursive_glob
        type: bool
        title: Recursive Glob
        required: false
        show_user: false
        description: Enable expanding ** into a recursive glob pattern.
      - name: exclude_files
        type: text
        title: Exclude Files
        description: A list of regular expressions to match the files that you want Filebeat to ignore.
        multi: true
        required: false
        show_user: true
        default:
          - \.gz$
      - name: include_files
        type: text
        title: Include Files
        description: A list of regular expressions to match the files that you want Filebeat to collect.
        multi: true
        required: false
        show_user: false
      - name: symlinks
        type: bool
        title: Symlinks
        required: false
        show_user: false
        description: Enable symlink support.
      - name: resend_on_touch
        type: bool
        title: Resend On Touch
        required: false
        show_user: false
        description: Re-send a file when its metadata changes (e.g., when a file is touched).
      - name: check_interval
        type: text
        title: Check Interval
        required: false
        show_user: false
        description: How often the prospector checks for new files in the paths that are specified for harvesting.
      - name: ignore_older
        type: text
        title: Ignore Older
        required: false
        show_user: false
        description: If this option is enabled, Filebeat ignores every file that has not been modified within the specified timespan.
      - name: ignore_inactive
        type: text
        title: Ignore Inactive
        required: false
        show_user: false
        description: If this option is enabled, Filebeat ignores every file that has been inactive since the specified time. Valid options are since_first_start and since_last_start.
      - name: close_on_state_changed_inactive
        type: text
        title: Close On State Change Inactive
        required: false
        show_user: false
        description: Closes the reader when a file has not been harvested for the specified time period.
      - name: close_on_state_changed_renamed
        type: bool
        title: Close On State Change Renamed
        required: false
        show_user: false
        description: Close the file handler when a file is renamed.
      - name: close_on_state_changed_removed
        type: bool
        title: Close On State Change Removed
        required: false
        show_user: false
        description: Close the file handler when a file is removed.
      - name: close_reader_eof
        type: bool
        title: Close Reader On EOF
        required: false
        show_user: false
        description: Close a file reader when the end of file is reached.
      - name: close_reader_after_interval
        type: text
        title: Close Reader After Interval
        required: false
        show_user: false
        description: Close a reader after the specified time period.
      - name: clean_inactive
        type: text
        title: Clean Inactive
        required: false
        show_user: false
        description: Remove the state of a file after the specified period of inactivity.
      - name: clean_removed
        type: bool
        title: Clean Removed
        required: false
        show_user: false
        description: Remove the state entry for a file that has been removed from disk.
      - name: backoff_init
        type: text
        title: Backoff Init
        required: false
        show_user: false
        description: The initial time to wait before checking a file again when EOF is reached.
      - name: backoff_max
        type: text
        title: Backoff Max
        required: false
        show_user: false
        description: The maximum time to wait before checking a file again when EOF is reached.
      - name: rotation_external_strategy_copytruncate
        type: yaml
        title: Rotation External Strategy Copy Truncate
        required: false
        show_user: false
        description: Configuration for the copy-truncate rotation strategy.
      - name: encoding
        type: text
        title: Encoding
        required: false
        show_user: false
        description: The file encoding to use for reading data that contains international characters.
      - name: exclude_lines
        type: text
        title: Exclude Lines
        multi: true
        required: false
        show_user: false
        description: A list of regular expressions to match lines that should be excluded from the output.
      - name: include_lines
        type: text
        title: Include Lines
        multi: true
        required: false
        show_user: false
        description: A list of regular expressions to match lines that should be included in the output.
      - name: buffer_size
        type: integer
        title: Buffer Size
        required: false
        show_user: false
        description: The size in bytes of the buffer that each harvester uses when fetching a file.
      - name: message_max_bytes
        type: integer
        title: Message Max Bytes
        required: false
        show_user: false
        description: The maximum number of bytes that a single log message can have.
      - name: parsers
        type: yaml
        title: Parsers
        required: false
        show_user: false
        description: This option expects a list of parsers that the payload has to go through.
      - name: harvester_limit
        type: integer
        title: Harvester Limit
        required: false
        show_user: false
        description: Limits the number of harvesters that are started in parallel.
      - name: fingerprint
        type: bool
        title: Use Fingerprint File Identity
        required: false
        show_user: false
        default: false
        description: Use file content fingerprint for file identity instead of native file identity.
      - name: fingerprint_offset
        type: integer
        title: Fingerprint Offset
        required: false
        show_user: false
        description: The byte offset for the start of the fingerprint.
      - name: fingerprint_length
        type: integer
        title: Fingerprint Length
        required: false
        show_user: false
        description: The number of bytes used for fingerprinting.
      - name: file_identity_native
        type: bool
        title: Use Native File Identity
        required: false
        show_user: false
        description: Use native file identity (inode and device ID on Linux, file index on Windows).
      - name: condition
        type: text
        title: Condition
        required: false
        show_user: false
        description: Condition to filter when the input is applied.
      - name: delete_enabled
        type: bool
        title: Delete Enabled
        required: false
        show_user: false
        description: If true, files are deleted after they have been read completely.
      - name: delete_grace_period
        type: text
        title: Delete Grace Period
        required: false
        show_user: false
        description: Time to wait before deleting a file after it has been fully read.
      - name: custom
        type: yaml
        title: Additional Filestream Configuration Options
        required: false
        show_user: false
        description: Configuration options that can be used to further change input configuration. Check the Filebeat documentation for more information.
      - &ref_0
        name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`
        type: bool
        default: false
      - &ref_1
        name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
      - &ref_2
        name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata.
  - input: aws-s3
    template_path: aws-s3.yml.hbs
    title: Splunk HEC (Ingest Actions via S3)
    description: Processes Splunk HEC JSON delivered to S3 by Splunk Ingest Actions
    vars:
      - name: bucket_arn
        type: text
        title: Bucket ARN
        multi: false
        required: false
        show_user: true
        description: ARN of the AWS S3 bucket that will be polled for list operation. (Required when queue_url and non_aws_bucket_name are not set).
      - name: queue_url
        type: text
        title: Queue URL
        multi: false
        required: false
        show_user: true
        description: URL of the AWS SQS queue that messages will be received from.
      - name: non_aws_bucket_name
        type: text
        title: Non-AWS Bucket Name
        multi: false
        required: false
        show_user: true
        description: Name of the S3-compatible bucket when using a non-AWS provider (required when bucket_arn and queue_url are not set).
      - name: number_of_workers
        type: integer
        title: Number of Workers
        multi: false
        required: false
        default: 1
        show_user: true
        description: Number of workers that will process the S3 objects listed. (Required when bucket_arn is set).
      - name: parsers
        type: yaml
        title: Parsers
        description: This option expects a list of parsers that the payload has to go through.
        required: false
        show_user: true
        multi: false
      - name: api_timeout
        type: text
        title: API Timeout
        multi: false
        required: false
        show_user: false
        description: The maximum duration of AWS API can take. The maximum is half of the visibility timeout value.
      - name: bucket_list_interval
        type: text
        title: Bucket List Interval
        multi: false
        required: false
        show_user: false
        default: 120s
        description: Time interval for polling listing of the S3 bucket.
      - name: bucket_list_prefix
        type: text
        title: Bucket List Prefix
        multi: false
        required: false
        show_user: false
        description: Prefix to apply for the list request to the S3 bucket.
      - name: content_type
        type: text
        title: Content Type
        multi: false
        required: false
        show_user: false
        description: A standard MIME type describing the format of the object data. This can be set to override the MIME type that was given to the object when it was uploaded.
      - name: encoding
        type: text
        title: Encoding
        multi: false
        required: false
        show_user: false
        description: The file encoding to use for reading data that contains international characters. This only applies to non-JSON logs.
      - name: expand_event_list_from_field
        type: text
        title: Expand Event List from Field
        multi: false
        required: false
        show_user: false
        description: If the fileset using this input expects to receive multiple messages bundled under a specific field then the config option expand_event_list_from_field value can be assigned the name of the field.
      - name: file_selectors
        type: yaml
        title: File Selectors
        multi: true
        required: false
        show_user: false
        description: If the SQS queue will have events that correspond to files that this integration should not process, file_selectors can be used to limit the files that are downloaded.
      - name: fips_enabled
        type: bool
        title: Enable S3 FIPS
        default: false
        multi: false
        required: false
        show_user: false
        description: Enabling this option changes the service name from s3 to s3-fips for connecting to the correct service endpoint.
      - name: max_bytes
        type: text
        title: Max Bytes
        default: 10MiB
        multi: false
        required: false
        show_user: false
        description: The maximum number of bytes that a single log message can have. This only applies to non-JSON logs.
      - name: buffer_size
        type: integer
        title: Buffer Size
        multi: false
        required: false
        show_user: false
        description: The size in bytes of the read buffer each harvester uses when reading the file.
      - name: include_s3_metadata
        type: text
        title: Include S3 Metadata
        multi: true
        required: false
        show_user: false
        description: List of S3 object metadata keys to include as fields in the event.
      - name: path_style
        type: bool
        title: Use Path Style
        multi: false
        required: false
        show_user: false
        description: Force path-style addressing for S3-compatible non-AWS endpoints (e.g. MinIO).
      - name: provider
        type: text
        title: S3 Provider
        multi: false
        required: false
        show_user: false
        description: Name of the S3-compatible service provider (e.g. minio, wasabi). Used with non_aws_bucket_name.
      - name: max_number_of_messages
        type: integer
        title: Maximum Concurrent SQS Messages
        description: The maximum number of SQS messages that can be inflight at any time.
        default: 5
        required: false
        show_user: false
      - name: visibility_timeout
        type: text
        title: Visibility Timeout
        multi: false
        required: false
        show_user: false
        description: The duration that the received messages are hidden from subsequent retrieve requests after being retrieved by a ReceiveMessage request.
      - name: sqs.max_receive_count
        type: integer
        title: SQS Message Maximum Receive Count
        multi: false
        required: false
        show_user: false
        default: 5
        description: The maximum number of times a SQS message should be received (retried) before deleting it.
      - name: sqs.wait_time
        type: text
        title: SQS Maximum Wait Time
        multi: false
        required: false
        show_user: false
        default: 20s
        description: The maximum duration that an SQS ReceiveMessage call should wait for a message to arrive in the queue before returning.
      - name: credential_profile_name
        type: text
        title: Credential Profile Name
        multi: false
        required: false
        show_user: false
        description: Profile name in shared credentials file.
      - name: shared_credential_file
        type: text
        title: Shared Credential File
        multi: false
        required: false
        show_user: false
        description: Directory of the shared credentials file. Defaults to the HOME path.
      - name: access_key_id
        type: password
        title: Access Key ID
        multi: false
        required: false
        show_user: true
        secret: true
        description: First part of access key.
      - name: secret_access_key
        type: password
        title: Secret Access Key
        multi: false
        required: false
        show_user: true
        secret: true
        description: Second part of access key.
      - name: session_token
        type: password
        title: Session Token
        multi: false
        required: false
        show_user: true
        secret: true
        description: Required when using temporary security credentials.
      - name: role_arn
        type: text
        title: Role ARN
        multi: false
        required: false
        show_user: false
        description: AWS IAM role ARN to assume for cross-account or role-based access.
      - name: endpoint
        type: text
        title: Endpoint
        multi: false
        required: false
        show_user: false
        description: URL of the entry point for an AWS web service.
      - name: default_region
        type: text
        title: Default AWS Region
        multi: false
        required: false
        show_user: false
        default: ''
        description: Default region to use prior to connecting to region specific services/endpoints if no AWS region is set from environment variable, credentials or instance profile.
      - name: proxy_url
        type: text
        title: Proxy URL
        multi: false
        required: false
        show_user: false
        description: URL to proxy connections in the form of http[s]://<user>:<password>@<server name/ip>:<port>.
      - *ref_0
      - *ref_1
      - *ref_2
  - input: http_endpoint
    template_path: http_endpoint.yml.hbs
    title: Splunk HEC (HTTP endpoint)
    description: Processes Splunk HEC JSON received directly via HTTP
    vars:
      - name: listen_address
        type: text
        title: Listen Address
        description: Bind address for the HTTP listener. Use 0.0.0.0 to listen on all interfaces.
        required: true
        show_user: true
        default: localhost
      - name: listen_port
        type: text
        title: Listen port
        description: Bind port for the listener.
        required: true
        show_user: true
        default: '8080'
      - name: url
        type: text
        title: URL
        description: This options specific which URL path to accept requests on. Defaults to /.
        required: false
        show_user: true
      - name: prefix
        type: text
        title: Prefix
        description: This option specifies which prefix field the incoming request will be mapped to.
        required: false
        show_user: false
      - name: basic_auth
        type: bool
        title: Basic Auth
        description: Enables or disables HTTP basic auth for each incoming request.
        required: false
        show_user: false
      - name: username
        type: text
        title: Username
        description: If basic_auth is enabled, this is the username used for authentication against the HTTP listener.
        required: false
        show_user: false
      - name: password
        type: password
        title: Password
        description: If basic_auth is enabled, this is the password used for authentication against the HTTP listener.
        required: false
        show_user: false
        secret: true
      - name: secret_header
        type: text
        title: Secret Header
        description: The header to check for a specific value specified by secret.value.
        required: false
        show_user: false
        secret: false
      - name: secret_value
        type: password
        title: Secret Value
        description: The secret stored in the header name specified by secret.header.
        required: false
        show_user: false
        secret: true
      - name: hmac_header
        type: text
        title: HMAC Header
        description: The name of the header that contains the HMAC signature.
        required: false
        show_user: false
      - name: hmac_key
        type: password
        title: HMAC Key
        description: The secret key used to calculate the HMAC signature.
        required: false
        show_user: false
        secret: true
      - name: hmac_type
        type: text
        title: HMAC Type
        description: The hash algorithm to use for the HMAC comparison. Valid values are sha256 or sha1.
        required: false
        show_user: false
      - name: hmac_prefix
        type: text
        title: HMAC Prefix
        description: The prefix for the signature. Certain webhooks prefix the HMAC signature with a value, for example sha256=.
        required: false
        show_user: false
      - name: content_type
        type: text
        title: Content Type
        description: By default the input expects the incoming POST to include a Content-Type of application/json.
        required: false
        show_user: false
      - name: response_code
        type: text
        title: Response Code
        description: The HTTP response code returned upon success. Should be in the 2XX range.
        required: false
        show_user: false
      - name: response_body
        type: text
        title: Response Body
        description: The response body returned upon success. Should be a single line JSON string.
        required: false
        show_user: false
      - name: include_headers
        type: text
        title: Include Headers
        description: This options specifies a list of HTTP headers that should be copied from the incoming request and included in the document.
        multi: true
        required: false
        show_user: false
      - *ref_0
      - *ref_1
      - *ref_2
